# Leafy green appearance.
general {
    gaps_in = 7
    gaps_out = 10
    border_size = 0
    col.active_border = rgba(6FA36FFF)
    col.inactive_border = rgba(00000000)
    resize_on_border = true
    allow_tearing = false
    layout = dwindle
}

dwindle {
    preserve_split = true
}

decoration {
    rounding = 15
    active_opacity = 0.92
    inactive_opacity = 0.82
    fullscreen_opacity = 1.0

    shadow {
        enabled = false
        range = 10
        render_power = 2
        color = rgba(2E4A2A22)
    }

    blur {
        enabled = true
        size = 5
        passes = 2
        vibrancy = 0.08
    }
}

animations {
    enabled = true
    bezier = soft, 0.22, 1, 0.36, 1
    animation = windows, 1, 4, soft, popin 85%
    animation = windowsOut, 1, 4, soft, popin 85%
    animation = border, 1, 5, soft
    animation = fade, 1, 4, soft
    animation = workspaces, 1, 5, soft
}

misc {
    disable_hyprland_logo = true
    disable_splash_rendering = true
}
