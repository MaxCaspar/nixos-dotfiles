# Hyprland entrypoint: keep this file small and route config by concern.
# This makes edits safer, easier to diff, and simpler to theme.

# Core variables used across sourced files.
$mod = SUPER
$terminal = kitty

# Load order matters: base environment first, then behavior and visuals.
source = ~/.config/hypr/conf/env.conf
source = ~/.config/hypr/conf/monitors.conf
source = ~/.config/hypr/conf/input.conf
source = ~/.config/hypr/conf/looknfeel.conf
source = ~/.config/hypr/conf/binds.conf
source = ~/.config/hypr/conf/autostart.conf
